<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student ID Card</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="id-card">
    <header class="id-card__header">
      <div class="id-card__logo">📘</div>
      <div>
        <h1 class="id-card__school">Sunrise High School</h1>
        <p class="id-card__subtitle">Student Identification Card</p>
      </div>
    </header>

    <section class="id-card__body">
      <div class="id-card__photo" aria-label="Student photo">
        <span>Photo</span>
      </div>

      <div class="id-card__info">
        <p><strong>Name:</strong> <span class="id-card__value">Alex Morgan</span></p>
        <p><strong>ID #:</strong> <span class="id-card__value">2026-0492</span></p>
        <p><strong>Program:</strong> <span class="id-card__value">Computer Science</span></p>
        <p><strong>Grade:</strong> <span class="id-card__value">11</span></p>
      </div>
    </section>

    <footer class="id-card__footer">
      <p class="id-card__note">For school use only • Valid through 06/2027</p>
    </footer>
  </main>
</body>
</html>
